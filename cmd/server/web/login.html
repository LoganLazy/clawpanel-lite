<!doctype html>
<html lang="zh">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ClawPanel Lite - 登录</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <div class="brand" style="margin-bottom: 10px;">
        <div class="logo">🦀</div>
        <div>
          <div><strong>ClawPanel Lite</strong></div>
          <div class="muted">轻量 OpenClaw 管理面板</div>
        </div>
      </div>
      <form method="POST" action="/login" class="form">
        <div class="row">
          <label>用户名</label>
          <input name="username" value="admin" />
        </div>
        <div class="row">
          <label>密码</label>
          <input name="password" type="password" />
        </div>
        <div class="actions">
          <button type="submit">登录</button>
        </div>
        <div class="muted" id="error" style="display:none;color:#f87171;">用户名或密码错误</div>
      </form>
    </div>
  </div>
  <script>
    if (location.search.includes('error=1')) {
      document.getElementById('error').style.display = 'block';
    }
  </script>
</body>
</html>
